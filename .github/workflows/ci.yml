# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# GitHub Actions Continuous Integration workflow.
#
# Triggers on every push and pull request to main/develop.
# Runs: dependency install → linting → unit tests → coverage report
#
# Integration tests (real API calls) are excluded from CI to avoid
# API costs and flaky failures. Run them locally with:
#   pytest -m integration
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Install package in editable mode
        run: pip install -e .

      # ── 4. Lint with Ruff ─────────────────────────────────────────────────
      - name: Lint with Ruff
        run: ruff check research_agent/ tests/

      # ── 5. Check formatting with Black ────────────────────────────────────
      - name: Check formatting with Black
        run: black --check research_agent/ tests/ examples/

      # ── 6. Run unit tests (no API calls) ──────────────────────────────────
      # -m "not integration" excludes any test marked @pytest.mark.integration
      - name: Run unit tests
        run: pytest tests/ -m "not integration" --cov=research_agent --cov-report=xml -v
        env:
          # Provide a dummy key so Config() doesn't raise during unit tests
          OPENAI_API_KEY: "sk-test-dummy-key-for-ci"

      # ── 7. Upload coverage to Codecov ─────────────────────────────────────
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false   # don't fail CI if Codecov is unavailable
